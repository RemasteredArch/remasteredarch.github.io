name: Build and Deploy to GitHub Pages
on:
    push:
        branches:
            # - main # Enable before merging rewrite
            - rewrite # Disable before merging rewrite
        paths-ignore:
            - docs/**
            - README.md
            - LICENSE
    # page_build: # A push to the branch that publishes to GitHub Pages

# If this workflow triggers while another run is ongoing, cancel the first run.
concurrency:
    group: pages
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    build:
        name: Build Astro Website
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm
                  cache-dependency-path: package-lock.json
            - name: Get GitHub Pages Info
              id: pages
              uses: actions/configure-pages@v6
            - name: Install Dependencies
              run: npm ci
            - name: Build Site
              run: npm run build -- \
                  --site '${{ steps.pages.outputs.origin }}' \
                  --base '${{ steps.pages.outputs.base_path }}'
            - name: Upload Website Files
              uses: actions/upload-pages-artifact@v5
              with:
                  path: dist/
    deploy:
        name: Deploy Astro Website to GitHub Pages
        if: ${{ github.ref == 'refs/heads/main' }}
        needs: build
        runs-on: ubuntu-24.04
        environment:
            name: github-pages
            url: ${{ steps.deploy.outputs.page_url }}
        permissions:
            pages: write
            id-token: write
        steps:
            - name: Deploy Website
              id: deploy
              uses: actions/deploy-pages@v5
